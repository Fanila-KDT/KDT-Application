<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: rgb(69, 109, 122);">
  <div class="container-fluid">
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item" *ngFor="let item of [
          {key:'Inventory', label:'Inventory'},
          {key:'Sales', label:'Sales'},
          {key:'Service', label:'Service'},
          {key:'Accounts', label:'Accounts'},
          {key:'HR', label:'HR'},
          {key:'Admin', label:'Admin'}
        ]">
          <a class="nav-link"
             href="javascript:void(0)"
             [ngClass]="{'active': activeHeader === item.key}"
             (click)="setActiveHeader(item.key)">
            {{ item.label }}
          </a>
        </li>
      </ul>

      <!-- Right-aligned logout -->
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <span class="nav-link" style="color: rgb(255, 255, 255);background-color: rgb(28, 56, 75);border-radius: 7px;">
            <i class="fas fa-user"></i> {{ username }}
          </span>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0)" (click)="logout()" style="color: rgb(0, 0, 0);background-color:rgb(199, 18, 18) ;border-radius: 7px;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

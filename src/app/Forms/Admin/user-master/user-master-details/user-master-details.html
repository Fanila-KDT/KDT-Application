<div class="container-fluid">
  <form ngForm #UserMasterForm="ngForm" name="form" (ngSubmit)="UserMasterForm.form.valid && onSubmit(UserMasterForm)" novalidate>
        <div class="row">
            <!-- User ID -->
            <div class="col-md-2">
                <div class="label-wrapper">
                    <label for="user_id" class="form-label">User ID
                        <span class="required-star">*</span>
                    </label>
                </div>
                <div class="input-wrapper">
                    <input type="text" class="label-input" id="user_id" [disabled]="itemDisable"  [ngClass]="{'is-invalid': isUserIdInvalid}"
                        name="user_id" [(ngModel)]="userMasterModel.user_id" #user_id="ngModel">
                </div>
            </div>
            <!-- User Name -->
            <div class="col-md-2">
                <div class="label-wrapper">
                    <label for="user_name" class="form-label">User Name
                        <span class="required-star">*</span>
                    </label>
                </div>
                <div class="input-wrapper">
                    <input type="text" class="label-input" id="user_name" [disabled]="itemDisable"  [ngClass]="{'is-invalid': isUserNameInvalid}"
                        name="user_name" [(ngModel)]="userMasterModel.user_name" #user_name="ngModel">
                </div>
            </div>
            <!-- Password -->
            <div class="col-md-2">
                <div class="label-wrapper">
                    <label for="user_description" class="form-label">Password
                        <span class="required-star">*</span>  
                    </label>
                </div>
                <div class="input-wrapper">
                    <input type="password" class="label-input" id="password" [disabled]="itemDisable" [ngClass]="{'is-invalid': isPasswordInvalid}"
                        name="password" [(ngModel)]="userMasterModel.password" #password="ngModel">
                </div>
            </div>
            <!--Roles -->
            <div class="col-md-2" >
                <div class="label-wrapper d-flex align-items-center">
                    <label for="outlet" class="form-label  fw-semibold">Roles
                        <span class="required-star">*</span>
                    </label>
                </div>
                <div class="input-wrapper">
                    <ng-select [items]="roleList" bindLabel="roleName" bindValue="roleID" [(ngModel)]="selectedRoles" [multiple]="true"  [disabled]="itemDisable" 
                        dropdownPanelClass="'black-dropdown'" [ngModelOptions]="{ standalone: true }"  (change)="onRoleNameChange()" class="select-input"
                        [ngClass]="{'is-invalid': isRoleInvalid}">
                    </ng-select>
                </div>
            </div>
            <div class="col-md-1 spacing-left">
                <!--Active -->
                <div class="col-md-9"> 
                    <div class="form-group">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" class="checkbox style-0" [(ngModel)]="userMasterModel.inactive" 
                                name="inactive" #inactive="ngModel" [disabled]="itemDisable" style="padding-right: 52px;"> 
                            <span class="checkmark"></span>
                            <span class="checkbox-label">Inctive</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <!-- Company -->
            <!-- <div class="col-md-2">
                <div class="label-wrapper d-flex align-items-center">
                    <label for="company" class="form-label  mb-0">Company

                    </label>
                </div>
                <div class="input-wrapper">
                    <select class="label-input" id="company_code"
                        name="company_code" [(ngModel)]="userMasterModel.company_code" #company_code="ngModel" [disabled]="itemDisable" >
                        <option *ngFor="let company of companyList" [value]="company.company_code">{{ company.company_name }}</option>
                    </select>
                </div>
            </div> -->
            <!-- Warehouse / Outlet -->
            <!-- <div class="col-md-3">
                <div class="label-wrapper d-flex align-items-center">
                    <label for="outlet" class="form-label  mb-0">Warehouse / Outlet
                    <span class="required-star">*</span>
                    </label>
                </div>
                <div class="input-wrapper">
                    <select class="label-input" id="godown_code"
                        name="godown_code" [(ngModel)]="userMasterModel.godown_code" #godown_code="ngModel" [disabled]="itemDisable" [ngClass]="{'is-invalid': isOutletInvalid}">
                        <option *ngFor="let outlet of outletList" [value]="outlet.godown_code">{{ outlet.godown_name }}</option>
                    </select>
                </div>
            </div> -->

                    <label for="inv" class="form-label">Invoice Outlet</label>
                </div>
                <div class="input-wrapper">
                    <select class="label-input" id="invoice_godown_code"
                        name="invoice_godown_code" [(ngModel)]="userMasterModel.invoice_godown_code" #invoice_godown_code="ngModel" [disabled]="itemDisable" >
                        <option *ngFor="let inv of invList" [value]="inv.invoice_godown_code">{{ inv.inv_group_name }}</option>
                    </select>
                </div>
            </div> -->
            <!-- Sales Man -->
            <!-- <div class="col-md-3">
                <div class="label-wrapper">
                    <label for="inv" class="form-label">Salesman</label>
                </div>
                <div class="input-wrapper">
                    <select class="label-input" id="salesman_id"
                        name="salesman_id" [(ngModel)]="userMasterModel.salesman_id" #salesman_id="ngModel" [disabled]="itemDisable" >
                        <option *ngFor="let sale of saleList" [value]="sale.salesman_id">{{ sale.inv_group_name }}</option>
                    </select>
                </div>
            </div> -->
        </div>
        
      <div class="mt-3">
            <fieldset class="border p-2 rounded">
                <legend class="fw-semibold">Permissions</legend>
                <div class="table-scroll">
                <table class="table table-bordered table-sm mb-0">
                    <thead class="table-light">
                    <tr>
                        <th (click)="setSort('roleName')">
                        Role Name
                        <span *ngIf="sortField==='roleName'">
                            {{ sortDirection==='asc' ? '▲' : '▼' }}
                        </span>
                        </th>
                        <th (click)="setSort('permissionName')">
                        Permission Name
                        <span *ngIf="sortField==='permissionName'">
                            {{ sortDirection==='asc' ? '▲' : '▼' }}
                        </span>
                        </th>
                        <th (click)="setSort('level_of_rights')">
                        Level of Rights
                        <span *ngIf="sortField==='level_of_rights'">
                            {{ sortDirection==='asc' ? '▲' : '▼' }}
                        </span>
                        </th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr *ngFor="let item of ShoePermissionList | orderBy:sortField:sortDirection">
                        <td>{{ item.roleName }}</td>
                        <td>{{ item.permissionName }}</td>
                        <td>{{ item.level_of_rights }}</td>
                    </tr>
                    </tbody>
                </table>
                </div>
            </fieldset>
        </div>

    <!-- Footer Buttons -->
    <div class="inbox-compose-footer">
      <div class="btn-group">
        <button type="submit" class="btn btn-primary" [disabled]="saveDisable">
          <i class="fa fa-save"></i> Save
        </button>
        <button type="button" class="btn btn-danger" [disabled]="cancelDisable" (click)="cancelClickMethod()">
          <i class="fa fa-ban"></i> Cancel
        </button>
      </div>
    </div>
  </form>

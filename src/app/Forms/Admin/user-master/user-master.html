<div class="bg-body-secondary text-center py-5 rounded-2"> 
  <h2 class="display-6 fw-bold">User Master</h2> 
  <div class="container-fluid" >
    <fieldset class="fieldset-custom">
      <div class="row g-3">

        <!-- Button Group -->
        <div class="col-md-12 col-12">
          <div class="btn-toolbar flex-wrap gap-1 justify-content-start" style="margin-top:2px">
            <button type="button" class="btn btn-primary" (click)="buttonClick('N')" [disabled]="newDisable">
              <i class="fa fa-plus me-1"></i> New
            </button>
            <button type="button" class="btn btn-info" (click)="buttonClick('M')" [disabled]="modifyDisable">
              <i class="fa fa-edit me-1"></i> Modify
            </button>
            <button type="button" class="btn btn-danger" (click)="buttonClick('D')" [disabled]="deleteDisable">
              <i class="fa fa-trash me-1"></i> Delete
            </button>
            <button type="button" class="btn btn-secondary" [disabled]="searchDisable" (click)="Search()">
              <i class="fa fa-search me-1"></i> Search
            </button>
            <button type="button" class="btn btn-secondary" (click)="Refresh()" [disabled]="refreshDisable">
              <i class="fa fa-refresh me-1"></i>
            </button>
            <button type="button"  class="btn btn-gradient btn-lg d-flex ms-auto shadow-sm"  (click)="addRoles()">  
              <i class="fa fa-plus me-1"></i> Add Roles
            </button>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
  <!-- List Section -->
    <user-master-list></user-master-list>
  <!-- List Section -->
    <fieldset class="border mb-4">
      <user-master-details></user-master-details>
    </fieldset>
</div>


<div *ngIf="showModalSearch" class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-lg" style="max-width: 500px">
    <div class="modal-content shadow-lg rounded">
      <div class="modal-header bg-light border-bottom">
        <h5 class="modal-title text-primary">🔍 Search Here...</h5>
        <button type="button" class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-3"
                (click)="modalCancel()" aria-label="Close" title="Close">
          <i class="fas fa-times text-danger"></i>
        </button>
      </div>
      <div class="modal-body px-4 py-3">
        <div class="row g-3">
            <div class="col-md-6">
              <label for="user_id" class="form-label fw-semibold">User Id</label>
              <input type="number" class="form-control form-control-sm" id="user_id"
                    name="user_id" [(ngModel)]="userMasterModalSearch.user_id" #user_id="ngModel"
                    placeholder="Enter User Id">
            </div>

            <div class="col-md-6">
              <label for="user_name" class="form-label fw-semibold">User Name</label>
              <input type="text" class="form-control form-control-sm" id="user_name"
                    name="user_name" [(ngModel)]="userMasterModalSearch.user_name" #user_name="ngModel"
                    placeholder="Enter User Name">
            </div>

          <!-- <div class="col-md-6">
            <label for="outlet" class="form-label  fw-semibold">Warehouse / Outlet</label>
            <select class="form-control form-control-sm" id="godown_code"
              name="godown_code" [(ngModel)]="userMasterModalSearch.godown_code" #godown_code="ngModel" >
              <option *ngFor="let outlet of outletList" [value]="outlet.godown_code">{{ outlet.godown_name }}</option>
            </select>
          </div> -->
        </div>
        <div class="modal-footer bg-light border-top">
          <button class="btn btn-outline-secondary" (click)="modalCancel()">Cancel</button>
          <button class="btn btn-primary" (click)="modalSearch()">Search</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Full Page Modal -->
<div *ngIf="showModal" class="modal fade show d-block" tabindex="-1" role="dialog" >
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content shadow-lg rounded ">
      <div class="modal-header bg-gradient">
        <h5 class="modal-title"><b>Role Master</b></h5>
      </div>
      <div class="mt-3 d-flex flex-wrap" style="padding-left: 20px;">
        <button class="btn btn-info me-2" (click)="updateRole()">
          <i class="fa fa-edit me-1"></i>Modify
        </button>
        <button class="btn btn-danger me-2" (click)="deleteRoleBtn()">
          <i class="fa fa-trash me-1"></i>Delete
        </button>
      </div>
      <br>
      <fieldset class="fieldset-custom ">
        <div class="modal-body">
          <div *ngIf="errorMessageRole" class="alert alert-danger mt-1">
            {{ errorMessageRole }}
          </div>
          <div *ngIf="SuccessMessage" class="alert alert-success mt-1">
            {{ SuccessMessage }}
          </div>
          <br *ngIf="SuccessMessage">
          <br *ngIf="errorMessageRole">

          <div class="col-md-2" *ngIf="NewDivVisible">
            <label for="outlet" class="form-label  fw-semibold">Roles
              <span class="required-star">*</span>
            </label>
            <input type="text" class="form-control form-control-sm" id="RoleName" [ngClass]="{'is-invalid': isRoleInvalid}"
              name="RoleName" [(ngModel)]="roleMaster.RoleName" #RoleName="ngModel"
              placeholder="Enter Role Name">
          </div>

          <div class="col-md-2" *ngIf="ModifyDivVisible">
            <div class="label-wrapper d-flex align-items-center">
                <label for="account_code" class="form-label mb-0">Roles
                <span class="required-star">*</span>
                </label>
            </div>
            <div class="input-wrapper">
                <ng-select  [items]="roleList" bindLabel="roleName" bindValue="roleID" [(ngModel)]="rolePermissionMaster.RoleID"  class="select-modal"
                  (change)="onRoleNameChange()" dropdownPanelClass="'black-dropdown'" [ngModelOptions]="{ standalone: true }" >
                </ng-select>
            </div>
          </div>

          <div class="col-md-6" *ngIf="DeleteVisible">
            <label for="outlet" class="form-label fw-semibold">Roles
              <span class="required-star">*</span>
            </label>
            <div class="d-flex align-items-center gap-2">
              <div class="col-md-4">
                <div class="input-wrapper">
                  <ng-select class=" flex-grow-1" [items]="roleList" bindLabel="roleName" bindValue="roleID" [(ngModel)]="rolePermissionMaster.RoleID" dropdownPanelClass="'black-dropdown'"
                    class="select-modal" [ngModelOptions]="{ standalone: true }" >
                  </ng-select>
                </div>
              </div>
              <button class="btn btn-danger" (click)="deleteRole()" style="height: 45px;">
                <i class="fa fa-trash me-1"></i>
              </button>
            </div>
          </div>
          <br>
          <fieldset class="fieldset-sm border p-2 rounded" [disabled]="DeleteVisible">
            <legend class="fw-bold text-muted small">Select Permissions</legend>
            <div *ngIf="errorMessage" class="alert alert-danger mt-2">
              {{ errorMessage }}
            </div>
            <div class="modal-body" style="max-height: 400px; overflow-y: auto; overflow-x: hidden">
              <!-- Search box -->
              <div class="form-group d-flex align-items-center gap-2">
                <input
                  type="text"
                  class="custom-input form-control"
                  placeholder="Search by Permission Name"
                  [(ngModel)]="filterText"
                />
                <button class="btn btn-primary" (click)="addPermission()">Add</button>
              </div>
              <!-- Permissions list -->
              <ul class="list-group mt-3">
                <li class="list-group-item d-flex justify-content-between align-items-center"
                    *ngFor="let perm of permList | filter:filterText">
                  <div class="text-start">
                    {{ perm.permissionName.trim() }}
                  </div>
                  <div class="text-start align-items-center">
                    {{ perm.description.trim() }}
                  </div>
                  <div class="d-flex align-items-center gap-2">
                    <!-- Checkbox -->
                    <input type="checkbox"
                          [(ngModel)]="perm.selected"
                          (change)="onCheckboxChangePerm(perm)" />
                    <!-- Input field -->
                    <input type="text"
                      class="form-control form-control-sm"
                      placeholder="Rights level"
                      [(ngModel)]="perm.inputValue"
                      [disabled]="!perm.selected"
                      (ngModelChange)="onCheckboxChangePerm(perm)"
                      style="width: 100px;" />
                  </div>
                </li>
              </ul>
            </div>
          </fieldset>
        </div>
        <div class="modal-footer bg-light">
          <button class="btn btn-primary" (click)="saveModal()">Save</button>
          <button class="btn btn-danger" (click)="closeModal()">Cancel</button>
        </div>
      </fieldset>
    </div>
  </div>
</div>

<div *ngIf="ShowAddPermission" class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="customModalLabel" aria-hidden="true">
  <div class="custom-modal-dialog">
    <div class="custom-modal-content">
      <div class="custom-modal-header">
        <h5 class="custom-modal-title">➕ Add Permission Here...</h5>
        
      </div>
      <div class="custom-modal-body"> 
        <div class="row g-3">
          <div class="col-md-9">
              <div class="label-wrapper d-flex align-items-center">
                <label for="PermissionName" class="custom-label">Permission Name</label>
              </div>
              <input type="text" class="form-control shadow-sm" id="PermissionName" name="PermissionName" [(ngModel)]="permissionItems.PermissionName" #PermissionName="ngModel"
                placeholder="Enter Permission name" required [class.is-invalid]="PermissionName.invalid && PermissionName.touched"
              />
              <br>
              <div class="label-wrapper d-flex align-items-center">
                <label for="Description" class="custom-label">Description</label>
              </div>
              <input type="text" class="form-control shadow-sm" id="Description" name="Description" [(ngModel)]="permissionItems.Description" #Description="ngModel"
                placeholder="Enter Description"
              />
          </div>
        </div>
      </div>
      <div class="custom-modal-footer d-flex">
        <button class="btn btn-primary me-2" [disabled]="PermissionName.invalid" (click)="addPermissionOk()">Ok</button>
        <button class="btn btn-danger" (click)="addPermissionCancel()">Cancel</button>
      </div>
    </div>
  </div>
</div>

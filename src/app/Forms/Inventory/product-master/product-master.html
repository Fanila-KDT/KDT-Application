<div class="bg-body-secondary text-center py-5 rounded-2"> 
  <h2 class="display-6 fw-bold">Product Master</h2> 
  <div class="container-fluid" >
    <fieldset class="fieldset-custom">
      <div class="row g-3">

        <!-- Button Group -->
        <div class="col-md-12 col-12">
          <div class="btn-toolbar flex-wrap gap-1 justify-content-start" style="margin-top:2px">
            <button type="button" class="btn btn-primary" (click)="buttonClick('N')" [disabled]="newDisable">
              <i class="fa fa-plus me-1"></i> New
            </button>
            <button type="button" class="btn btn-info" (click)="buttonClick('M')" [disabled]="modifyDisable">
              <i class="fa fa-edit me-1"></i> Modify
            </button>
            <button type="button" class="btn btn-danger" (click)="buttonClick('D')" [disabled]="deleteDisable">
              <i class="fa fa-trash me-1"></i> Delete
            </button>
            <button type="button" class="btn btn-secondary" [disabled]="searchDisable" (click)="Search()">
              <i class="fa fa-search me-1"></i> Search
            </button>
            <button type="button" class="btn btn-secondary" (click)="Refresh()" [disabled]="refreshDisable">
              <i class="fa fa-refresh me-1"></i>
            </button>
            <button type="button" class="btn btn-secondary" (click)="AddPrevCode()" [disabled]="addPrevCodeDisable">
              <i class="fa fa-pencil-alt me-1"></i>Change Item Code
            </button>
            <button type="button" class="btn btn-gradient btn-lg shadow-sm" [disabled]="searchDisable" (click)="ShowList()"> 
              <i class="fa fa-book me-1"></i> Search Master Item
            </button>
            <button type="button" class="btn btn-lg d-flex ms-auto shadow-sm" [disabled]="gridDisable" (click)="toggleValue()"> 
              <i [ngClass]="gridDisabled ? 'fa fa-eye-slash me-1' : 'fa fa-eye me-1'"></i>
            </button>
          </div>
        </div>
      </div>
    </fieldset>
  </div>
  <!-- List Section -->
    <product-master-list></product-master-list>
  <!-- List Section -->
    <fieldset class="border mb-4">
      <product-master-details></product-master-details>
    </fieldset>
</div>

<div *ngIf="showModalSearch" class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-lg" style="max-width: 500px;">
    <div class="modal-content shadow-lg rounded">
      <div class="modal-header bg-light border-bottom">
        <h5 class="modal-title text-primary">🔍 Search Here...</h5>
        <button type="button" class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-3"
                (click)="modalCancel()" aria-label="Close" title="Close">
          <i class="fas fa-times text-danger"></i>
        </button>
      </div>
      <div class="modal-body px-4 py-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="item_code" class="form-label fw-semibold">Item Code</label>
            <input type="text" class="form-control form-control-sm" id="item_code"
                  name="item_code" [(ngModel)]="productMasterModelSearch.item_code" #item_code="ngModel"
                  placeholder="Enter item code">
          </div>

          <div class="col-md-6">
            <label for="item_name_abbr" class="form-label fw-semibold">Model Name</label>
            <input type="text" class="form-control form-control-sm" id="item_name_abbr"
                  name="item_name_abbr" [(ngModel)]="productMasterModelSearch.item_name_abbr" #item_name_abbr="ngModel"
                  placeholder="Enter model name">
          </div>

          <div class="col-md-6">
            <label for="item_name" class="form-label fw-semibold">Description</label>
            <input type="text" class="form-control form-control-sm" id="item_name"
                  name="item_name" [(ngModel)]="productMasterModelSearch.item_name" #item_name="ngModel"
                  placeholder="Enter description">
          </div>

          <div class="col-md-6">
            <label for="category_name" class="form-label fw-semibold">Product Class</label>
            <input type="text" class="form-control form-control-sm" id="category_name"
                  name="category_name" [(ngModel)]="productMasterModelSearch.category_name" #category_name="ngModel"
                  placeholder="Enter product class">
          </div>

          <div class="col-md-6">
            <label for="product_type" class="form-label fw-semibold">Product Type</label>
            <input type="text" class="form-control form-control-sm" id="product_type"
                  name="product_type" [(ngModel)]="productMasterModelSearch.product_type" #product_type="ngModel"
                  placeholder="Enter product type"> 
          </div>

          <div class="col-md-6">
            <label for="brand_name" class="form-label fw-semibold">Brand</label>
            <input type="text" class="form-control form-control-sm" id="brand_name"
                  name="brand_name" [(ngModel)]="productMasterModelSearch.brand_name" #brand_name="ngModel"
                  placeholder="Enter brand"> 
          </div>
        </div>
      </div>
      <div class="modal-footer bg-light border-top">
        <button class="btn btn-outline-secondary" (click)="modalCancel()">Cancel</button>
        <button class="btn btn-primary" (click)="modalSearch()">Search</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="showlist" class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel" aria-hidden="true" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-lg" style="max-width: 500px;">
    <div class="modal-content shadow-lg rounded">
      <div class="modal-header bg-light border-bottom">
        <h5 class="modal-title text-primary">📚 Search Item Code Here...</h5>
        <button type="button" class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-3"
                (click)="accessorySearchCancel()" aria-label="Close" title="Close">
          <i class="fas fa-times text-danger"></i>
        </button>
      </div>
      <div class="modal-body px-4 py-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="ItemCode" class="form-label fw-semibold">Item Code</label>
            <input
              type="text"
              class="form-control form-control-sm"
              id="ItemCode"
              name="ItemCode"
              [(ngModel)]="ItemCode"
              #ItemCodes="ngModel"
              placeholder="Enter item code"
              required
              [class.is-invalid]="ItemCodes.invalid && ItemCodes.touched"
            />
          </div>
        </div>
      </div>
      <div class="modal-footer bg-light border-top">
        <button class="btn btn-primary" [disabled]="ItemCodes.invalid" (click)="accessorySearch()">Ok</button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="AddPrevCodeList" class="modal fade show d-block" tabindex="-1" role="dialog" aria-labelledby="customModalLabel" aria-hidden="true" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-lg" style="max-width: 500px;">
    <div class="modal-content shadow-lg rounded">
      
      <!-- Header -->
      <div class="modal-header bg-light border-bottom">
        <h5 class="modal-title text-primary">✍ Change Item Code Here...</h5>
        <button type="button" class="btn btn-light rounded-circle shadow-sm position-absolute top-0 end-0 m-3"
                (click)="PrevCodeListCancel()" aria-label="Close" title="Close">
          <i class="fas fa-times text-danger"></i>
        </button>
      </div>

      <!-- Body -->
      <div class="modal-body px-4 py-3">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="prev_code" class="form-label fw-semibold">Current Item Code</label>
            <input type="text" class="form-control" id="prev_code" name="prev_code"
                   [(ngModel)]="prevCodeSave.prev_code" #prev_code="ngModel" disabled />
          </div>
          <div class="col-md-6">
            <label for="NewItemCode" class="form-label fw-semibold">New Item Code</label>
            <input type="text" class="form-control" id="NewItemCode" name="NewItemCode"
                   [(ngModel)]="NewItemCode" #NewItemCodes="ngModel"
                   placeholder="Enter item code" required
                   [class.is-invalid]="NewItemCodes.invalid && NewItemCodes.touched" />
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer bg-light border-top">
        <button class="btn btn-primary" [disabled]="NewItemCodes.invalid" (click)="PrevCodeListOk()">Ok</button>
      </div>
    </div>
  </div>
</div>

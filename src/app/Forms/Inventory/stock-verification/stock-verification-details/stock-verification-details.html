 <div class="container-fluid">
  <form ngForm #StockForm="ngForm" name="form" (ngSubmit)="StockForm.form.valid && onSubmit(StockForm)" novalidate>
    <div class="row">
      <!--GRN No -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="document_number" class="form-label  mb-0">GRN No
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="document_number" [disabled]="true" name="document_number"  name="document_number" 
            [(ngModel)]="stockVerification.document_number" #document_number="ngModel">
        </div>
      </div>
      <!--PO No -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="po_no" class="form-label  mb-0">PO No
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="po_no" [disabled]="true" name="po_no"  name="po_no" 
            [(ngModel)]="stockVerification.po_no" #po_no="ngModel">
        </div>
      </div>
      <!--Supplier Name -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="account_name" class="form-label  mb-0">Supplier Name
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="account_name" [disabled]="true" name="account_name"  name="account_name" 
            [(ngModel)]="stockVerification.account_name" #account_name="ngModel">
        </div>
      </div>
      <!--Warehouse Name -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="godown_name" class="form-label  mb-0">Warehouse Name
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="godown_name" [disabled]="true" name="godown_name"  name="godown_name" 
            [(ngModel)]="stockVerification.godown_name" #godown_name="ngModel">
        </div>
      </div>
      <!-- Entry Date -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="voucher_date" class="form-label">Entry Date
          </label>
        </div>
        <div class="input-wrapper">
          <div class="datepicker-wrapper">
            <input type="text" class="form-control" bsDatepicker #dp="bsDatepicker" placeholder="dd/MM/yyyy" [disabled]="true"
              [bsConfig]="{
                dateInputFormat: 'DD/MM/YYYY',
                showWeekNumbers: false
              }"
              (bsValueChange)="onDateSelected($event)" [ngModel]="stockVerification.verifiedDate" (ngModelChange)="formatToDateInput($event)" [ngModelOptions]="{ standalone: true }"
              />
            <button type="button" class="btn btn-outline-secondary" (click)="dp.show()" [disabled]="itemDisable">
              📅
            </button>
            </div> 
        </div>
      </div>
    </div>

    <ngx-datatable 
      class="table table-bordered styled-grid"
      [rows]="rows"
      [scrollbarV]="scroll"
      [virtualization]="true"
      [style.height.px]="590"
      [columnMode]="'force'"
      [headerHeight]="50"
      [footerHeight]="60"
      [rowHeight]="30"
      [limit]="500"
      [externalPaging]="false"
      [selected]="selected"
      [messages]="{ emptyMessage: 'No data to display' }"
      [reorderable]="reorderable"
      [selectionType]="SelectionType.single"
      [rowIdentity]="getRowIdentity"
      (activate)="onSubListActivate($event)">

      <!-- Sl No -->
      <ngx-datatable-column name="Sl No"  prop="seq_no" [maxWidth]="80">
        <ng-template let-row="row" let-rowIndex="rowIndex" ngx-datatable-cell-template>
          <input 
          type="text" 
            class="form-control" 
            value ="{{ rowIndex + 1 }}"
            />
        </ng-template>
      </ngx-datatable-column>


      <!-- Item Code -->
      <ngx-datatable-column name="Item Code" prop="item_code" >
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.item_code"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Model -->
      <ngx-datatable-column name="Model" prop="item_name_abbr" >
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.item_name_abbr"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Location -->
      <ngx-datatable-column name="Location" prop="bin_location" >
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.bin_location"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Quantity -->
     <ngx-datatable-column name="Qty" prop="receipt_quantity">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.receipt_quantity" 
            [disabled]="true" 
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column>

      <!-- Received -->
       <ngx-datatable-column name="Received" prop="received">
        <ng-template let-row="row" let-rowIndex="rowIndex" ngx-datatable-cell-template>
          <label class="toggle-switch">
            <input
              type="checkbox"
              [(ngModel)]="row.received"
              name="received_{{rowIndex}}"
              class="custom-input"
              [disabled] ="isEditable" (change)="ReceiveChange(row.received,row)"
              [ngModelOptions]="{ standalone: true }" 
            />
            <span class="slider"></span>
          </label>
        </ng-template>
      </ngx-datatable-column>

      <!-- Rec Qty -->
      <ngx-datatable-column name="Rec Qty" prop="verified_qty">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.verified_qty" 
            [disabled]="isEditable" (input)="RecQtyChange(row.verified_qty,row)"
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column>

      <!-- Footer -->
      <ngx-datatable-footer>
        <ng-template ngx-datatable-footer-template>
          <div class="col-md-12 d-flex justify-content-end align-items-center gap-2 datatable-footer-border">
            <span>Total Rows: {{ rows.length }}</span>
          </div>
        </ng-template>
      </ngx-datatable-footer>
    </ngx-datatable>

    <div class="row">
      <!--Remarks -->
      <div class="col-md-3"> 
        <div class="label-wrapper d-flex align-items-center">
          <label for="remarks" class="form-label  mb-0">Remarks
          </label>
        </div>
        <textarea class="label-input" id="remarks" name="remarks" rows="2"
          [(ngModel)]="stockVerification.remarks" #remarks="ngModel" [disabled] ="isEditable" >
        </textarea>
      </div>
      <!--Total Qty -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="total_qty" class="form-label  mb-0">Total Qty
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="total_qty" [disabled]="true" name="total_qty"  name="total_qty" 
            [(ngModel)]="totalQty" #total_qty="ngModel">
        </div>
      </div>
      <!--Rec Qty -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="rec_qty" class="form-label  mb-0">Rec Qty
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="rec_qty" [disabled]="true" name="rec_qty"  name="rec_qty" 
            [(ngModel)]="recQty" #rec_qty="ngModel">
        </div>
      </div>
    </div>

    <!-- Footer Buttons -->
    <div class="inbox-compose-footer" style="overflow: hidden;">
      <div class="btn-group pull-right">
        <div class="badge bg-color-greenLight action mine"></div>
        <button type="button" class="btn btn-warning" style="margin-right: 5px" [disabled]="saveDisable" (click)="saveAsDraftClickMethod()">
          <i class="fa fa-file-alt"></i>Save As Draft
        </button>
        <button type="submit" class="btn btn-primary" style="margin-right: 5px" [disabled]="saveDisable">
          <i class="fa fa-save"></i>Verify Stock
        </button>
        <button type="button" class="btn btn-danger" [disabled]="cancelDisable" (click)="cancelClickMethod()">
          <i class="fa fa-ban"></i>Cancel
        </button>
      </div>
    </div> 
  </form>
</div>

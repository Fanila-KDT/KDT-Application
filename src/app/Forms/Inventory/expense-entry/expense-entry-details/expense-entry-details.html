 <div class="container-fluid">
  <form ngForm #ExpenseForm="ngForm" name="form" (ngSubmit)="ExpenseForm.form.valid && onSubmit(ExpenseForm)" novalidate>
    <div class="row">
       <!-- <div class="input-wrapper">
          <input type="text" class="label-input" id="voucher_id" disabled name="voucher_id"  name="voucher_id" 
          [(ngModel)]="expenseEntry.voucher_id" #voucher_id="ngModel">
      </div>  -->
      <!--Doc No -->
        <div class="col-md-2">
            <div class="label-wrapper d-flex align-items-center">
            <label for="document_number" class="form-label  mb-0">Doc No
            </label>
            </div>
            <div class="input-wrapper">
                <input type="text" class="label-input" id="document_number" disabled name="document_number"  name="document_number" 
                [(ngModel)]="expenseEntry.document_number" #document_number="ngModel">
            </div>
        </div>
      <!-- Entry Date -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="voucher_date" class="form-label">Entry Date
            </label>
          </div>
          <div class="input-wrapper">
            <div class="datepicker-wrapper">
              <input type="text" class="form-control" bsDatepicker #dp="bsDatepicker" placeholder="dd/MM/yyyy" [disabled]="isEditable"
                [bsConfig]="{
                  dateInputFormat: 'DD/MM/YYYY',
                  showWeekNumbers: false
                }"
                (bsValueChange)="onDateSelected($event)" [ngModel]="expenseEntry.voucherDate" (ngModelChange)="formatToDateInput($event)" [ngModelOptions]="{ standalone: true }"
                />
              <button type="button" class="btn btn-outline-secondary" (click)="dp.show()" [disabled]="isEditable">
                📅
              </button>
              </div> 
          </div>
        </div>
      <!--Puch Ref No-->
        <div class="col-md-2">
            <div class="label-wrapper d-flex align-items-center">
            <label for="ref_grn" class="form-label  mb-0">Puch Ref No
            </label>
            </div>
            <div class="input-wrapper">
                <input type="text" class="label-input" id="ref_grn" disabled name="ref_grn"  name="ref_grn" 
                [(ngModel)]="expenseEntry.ref_grn" #ref_grn="ngModel">
            </div>
        </div>
      <!--Status-->
        <div class="col-md-2">
            <div class="label-wrapper d-flex align-items-center">
            <label for="approval_status" class="form-label  mb-0">Status
            </label>
            </div>
            <div class="input-wrapper">
                <input type="text" class="label-input" id="approval_status" disabled name="approval_status"  name="approval_status" 
                [(ngModel)]="expenseEntry.approval_status" #approval_status="ngModel">
            </div>
        </div>
      <!--Profit Center-->
        <div class="col-md-2">
            <div class="label-wrapper d-flex align-items-center">
            <label for="centername" class="form-label  mb-0">Profit Center
            </label>
            </div>
            <div class="input-wrapper">
                <input type="text" class="label-input" id="centername" disabled name="centername" [value]="expenseEntry.centername"
                [(ngModel)]="expenseEntry.centername" #centername="ngModel">
                <input type="hidden" name="centercode" [(ngModel)]="expenseEntry.centercode" #centercode="ngModel"  id="centercode">
            </div>
        </div>
      <!--Reference-->
        <div class="col-md-3">
          <div class="label-wrapper">
            <label for="voucher_reference" class="form-label">Reference
            </label>
          </div>
          <div class="input-wrapper">
              <textarea class="label-input" id="voucher_reference" name="voucher_reference" rows="2"
                [(ngModel)]="expenseEntry.voucher_reference" #voucher_reference="ngModel" [disabled]="isEditable" >
              </textarea>
          </div>
        </div>
    </div>
   
    <ngx-datatable 
      class="table table-bordered styled-grid"
      [rows]="rows"
      [scrollbarV]="scroll"
      [virtualization]="true"
      [style.height.px]="350"
      [columnMode]="'force'"
      [headerHeight]="50"
      [footerHeight]="60"
      [rowHeight]="30"
      [limit]="500"
      [externalPaging]="false"
      [selected]="selected"
      [messages]="{ emptyMessage: 'No data to display' }"
      [reorderable]="reorderable"
      [selectionType]="SelectionType.single"
      [rowIdentity]="getRowIdentity"
      (activate)="onSubListActivate($event)">

      <!-- Sl No -->
      <ngx-datatable-column name="Sl No"  prop="seq_no" [maxWidth]="80">
        <ng-template let-row="row" let-rowIndex="rowIndex" ngx-datatable-cell-template>
          <input 
          type="text" 
            class="form-control" 
            value ="{{ rowIndex + 1 }}"
            />
        </ng-template>
      </ngx-datatable-column>

      <!--  Doc No -->
      <ngx-datatable-column name="Doc No" prop="document_number" >
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.document_number"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Item Code -->
      <ngx-datatable-column name="Item Code" prop="item_code" >
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.item_code"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Model -->
      <ngx-datatable-column name="Model" prop="item_name_abbr"  [minWidth]="250">
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.item_name_abbr"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- P.Rate -->
      <ngx-datatable-column name="P. Rate" prop="enter_rate">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.enter_rate" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- F.Rate -->
      <ngx-datatable-column name="F. Rate" prop="fgn_rate">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.fgn_rate" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- Quantity -->
      <ngx-datatable-column name="Qty" prop="receipt_quantity">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.receipt_quantity" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- P.Total -->
      <ngx-datatable-column name="P.Total" prop="pamount">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.pamount" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- F.Total -->
      <ngx-datatable-column name="F.Total" prop="fgn_total">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.fgn_total" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- L.COST -->
      <ngx-datatable-column name="L.Cost" prop="cost_rate">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.cost_rate" 
            disabled 
            />
        </ng-template>
      </ngx-datatable-column>

      <!--Total Cost -->
      <ngx-datatable-column name="Total Cost" prop="transamount">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.transamount" 
            disabled
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- Footer -->
      <ngx-datatable-footer>
        <ng-template ngx-datatable-footer-template>
          <div class="col-md-12 d-flex justify-content-end align-items-center gap-2 datatable-footer-border">
            <span>Total Rows: {{ rows.length }}</span>
          </div>
        </ng-template>
      </ngx-datatable-footer>
    </ngx-datatable>

    <fieldset style="border: none !important;">
      <ngx-datatable 
        class="table table-bordered styled-grid"
        [rows]="expenseRows"
        [scrollbarV]="scroll"
        [virtualization]="true"
        [style.height.px]="280"
        [columnMode]="'force'"
        [headerHeight]="50"
        [footerHeight]="60"
        [rowHeight]="30"
        [limit]="50"
        [externalPaging]="false"
        [selected]="selected"
        [messages]="{ emptyMessage: 'No data to display' }"
        [reorderable]="reorderable"
        [selectionType]="SelectionType.single"
        [rowIdentity]="getExpenceRowIdentity"
       >

        <!-- Sl No -->
        <ngx-datatable-column name="Sl No"  prop="seq_no" [maxWidth]="80">
          <ng-template let-row="row" let-rowIndex="rowIndex" ngx-datatable-cell-template>
            <input 
            type="text" 
              class="form-control" 
              value ="{{ rowIndex + 1 }}"
              />
          </ng-template>
        </ngx-datatable-column>

        <!-- Account Name -->
      <ngx-datatable-column name="Account Name" prop="account_code">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <ng-select 
            [items]="AccountList" 
            bindLabel="account_name" 
            bindValue="account_code" 
            [(ngModel)]="row.account_code"
            [disabled]="isEditable"
            class="form-control grid-select"
            [ngModelOptions]="{ standalone: true }"
            [appendTo]="'body'">
          </ng-select>
        </ng-template>
      </ngx-datatable-column>

        <!-- Description -->
        <ngx-datatable-column name="Description" prop="rOW_REF" >
          <ng-template let-row="row" ngx-datatable-cell-template >
            <input 
              type="text" 
              class="form-control grid-input" 
              [(ngModel)]="row.rOW_REF"   
              [ngModelOptions]="{ standalone: true }"
              [disabled]="isEditable" />
          </ng-template>
        </ngx-datatable-column>

        <!-- Credit Amount -->
        <ngx-datatable-column name="Credit Amount" prop="credit_amount"  [minWidth]="250">
          <ng-template let-row="row" ngx-datatable-cell-template >
            <input 
              type="number" 
              class="form-control grid-input" 
              [(ngModel)]="row.credit_amount"  (input)="CreditAmountChange(row.credit_amount?row.credit_amount:0,row)"  
              [ngModelOptions]="{ standalone: true }"
              [disabled]="isEditable" />
          </ng-template>
        </ngx-datatable-column>

        <!-- F.Credit Amount -->
        <ngx-datatable-column name="F.Credit Amount" prop="fgn_credit_amount">
          <ng-template let-row="row" ngx-datatable-cell-template>
            <input 
              type="number" 
              class="form-control grid-input" (input)="ForiegnCreditAmountChange(row.fgn_credit_amount,row)"
              [(ngModel)]="row.fgn_credit_amount" 
              [ngModelOptions]="{ standalone: true }"
              [disabled]="isEditable"
              />
          </ng-template>
        </ngx-datatable-column>

        <!-- Delete -->
        <ngx-datatable-column name="Delete" [maxWidth]="70">
          <ng-template let-rowIndex="rowIndex" ngx-datatable-cell-template>
            <button 
              type="button" 
              class="btn btn-danger btn-sm delete-btn" 
              (click)="deleteRow(rowIndex)" 
              [disabled]="isEditable">
              🗑️
            </button>
          </ng-template>
        </ngx-datatable-column>

        <!-- Footer -->
        <ngx-datatable-footer>
          <ng-template ngx-datatable-footer-template>
            <div class="col-md-12 d-flex justify-content-end align-items-center gap-2 datatable-footer-border">
              <span>Total Rows: {{ expenseRows.length }}</span>
              <div class="btn-group">
                <button type="button" class="btn btn-add" (click)="addRow()" [disabled]="isEditable">➕ Add</button>
            </div>
            </div>
          </ng-template>
        </ngx-datatable-footer>
      </ngx-datatable>

      <div class="row">
        <!--Gross Total-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="line_amount" class="form-label  mb-0">Gross Total
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="line_amount" disabled name="line_amount"  name="line_amount" [(ngModel)]="expenseEntry.line_amount" #line_amount="ngModel">
          </div>
        </div>
        <!--Discount-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="discount" class="form-label  mb-0">Discount
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="discount" disabled name="discount"  name="discount" [(ngModel)]="expenseEntry.discount" #discount="ngModel">
          </div>
        </div>
        <!--Est.Landed Exp-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="est_landed_exp" class="form-label  mb-0">Est.Landed Exp
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="est_landed_exp" disabled name="est_landed_exp"  name="est_landed_exp" [(ngModel)]="expenseEntry.est_landed_exp" #est_landed_exp="ngModel">
          </div>
        </div>
        <!--Net Total-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="enter_amount" class="form-label  mb-0">Net Total
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="enter_amount" disabled name="enter_amount"  name="enter_amount" [(ngModel)]="expenseEntry.enter_amount" #enter_amount="ngModel">
          </div>
        </div>
        <!--Exch Rate-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="exch_rate" class="form-label  mb-0">Exchange Rate
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="exch_rate" disabled name="exch_rate"  name="exch_rate" [(ngModel)]="expenseEntry.exch_rate" #exch_rate="ngModel">
          </div>
        </div>
        <!--Foriegn Total-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="foriegn_total" class="form-label  mb-0">Foreign Total
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="foriegn_total" disabled name="foriegn_total"  name="foriegn_total" [(ngModel)]="expenseEntry.foriegn_total" #foriegn_total="ngModel">
          </div>
        </div>
        <!--Foriegn Total-->
        <div class="col-md-6">
          <div class="label-wrapper d-flex align-items-center">
            <label for="percentage" class="form-label  mb-0">Percentage(%)
            </label>
          </div>
          <div class="input-wrapper">
              <input type="text" class="label-input" id="percentage" disabled name="percentage"  name="percentage" [(ngModel)]="expenseEntry.percentage" #percentage="ngModel">
          </div>
        </div>
      </div>
    </fieldset>
    
    <div class="row">
      <!-- Created By-->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="created_by" class="form-label">Created By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="created_by" disabled 
              name="created_by" [(ngModel)]="expenseEntry.created_by" #created_by="ngModel">
        </div>
      </div>
      <!-- Created On-->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="created_date" class="form-label">Created On
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="created_date" disabled 
              name="created_date" [(ngModel)]="expenseEntry.created_date" #created_date="ngModel">
        </div>
      </div>
      <!-- Updated By -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="modified_by" class="form-label">Modified By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="modified_by" disabled 
              name="modified_by" [(ngModel)]="expenseEntry.modified_by" #modified_by="ngModel">
        </div>
      </div>
      <!-- Updated On -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="modified_date" class="form-label">Modified On
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="modified_date" disabled 
              name="modified_date" [(ngModel)]="expenseEntry.modified_date" #modified_date="ngModel">
        </div>
      </div>

      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="approved_by" class="form-label">Approved By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="approved_by" disabled 
              name="approved_by" [(ngModel)]="expenseEntry.approved_by" #approved_by="ngModel">
        </div>
      </div>

      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="approver_remarks" class="form-label">Approval Remarks
          </label>
        </div>
        <div class="input-wrapper">
            <textarea class="label-input" id="approver_remarks" name="approver_remarks" rows="2"
              [(ngModel)]="expenseEntry.approver_remarks" #approver_remarks="ngModel" disabled >
            </textarea>
        </div>
      </div>
    </div>

    <!-- Footer Buttons -->
    <div class="inbox-compose-footer" style="overflow: hidden;">
      <div class="btn-group pull-right">
        <div class="badge bg-color-greenLight action mine"></div>
        <!-- <button type="button" class="btn btn-warning" style="margin-right: 5px" [disabled]="saveDisable" (click)="saveAsDraftClickMethod()">
          <i class="fa fa-file-alt"></i>Draft
        </button> -->
        <button type="submit" class="btn btn-primary" style="margin-right: 5px" [disabled]="saveDisable">
          <i class="fa fa-save"></i>Save
        </button>
        <button type="button" class="btn btn-danger" [disabled]="cancelDisable" (click)="cancelClickMethod()">
          <i class="fa fa-ban"></i>Cancel
        </button>
      </div>
    </div> 
  </form>
</div>

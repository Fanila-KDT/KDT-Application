 <div class="container-fluid">
  <form ngForm #GRNForm="ngForm" name="form" (ngSubmit)="GRNForm.form.valid && onSubmit(GRNForm)" novalidate>
    <div class="row">
        <!-- Register -->
        <div class="col-md-2">
          <div class="label-wrapper d-flex align-items-center">
              <label for="register_code" class="form-label  mb-0">Register
              <span class="required-star">*</span>
              </label>
          </div>
          <div class="input-wrapper">
              <select class="label-input" id="register_code" [ngClass]="{'is-invalid': isRegisterInvalid}"
              name="register_code" [(ngModel)]="grnModel.register_code" #register_code="ngModel" [disabled]="registerDisable" (change)="registerChange(grnModel.register_code)" >
              <option *ngFor="let main of registerList" [value]="main.register_code">{{ main.register_name }}</option>
              </select>
          </div>
        </div>
        <!-- Vendor -->
        <div class="col-md-2">
          <div class="label-wrapper d-flex align-items-center">
              <label for="account_code" class="form-label mb-0">Vendor
              <span class="required-star">*</span>
              </label>
          </div>
          <div class="input-wrapper">
              <ng-select  [items]="vendorList" bindLabel="account_name" bindValue="account_code" [(ngModel)]="grnModel.account_code" class="select-input"
                (change)="VendorChange(grnModel.account_code)"[disabled]="itemDisable" [ngClass]="{'is-invalid': isVendorInvalid}"
                dropdownPanelClass="'black-dropdown'" [ngModelOptions]="{ standalone: true }" >
              </ng-select>
          </div>
        </div>
        <!-- Warehouse -->
        <div class="col-md-2">
          <div class="label-wrapper d-flex align-items-center">
              <label for="godown_code" class="form-label  mb-0">Warehouse
              <span class="required-star">*</span>
              </label>
          </div>
          <div class="input-wrapper">
              <select class="label-input" id="godown_code" [ngClass]="{'is-invalid': isWRHouseInvalid}"
              name="godown_code" [(ngModel)]="grnModel.godown_code" #godown_code="ngModel" [disabled]="itemDisable" >
              <option *ngFor="let main of warehouseList" [value]="main.godown_code">{{ main.godown_name }}</option>
              </select>
          </div>
        </div>
        <!--Invoice Number -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="invoice_no" class="form-label  mb-0">Invoice Number
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="invoice_no" [disabled]="itemDisable" name="invoice_no"  name="invoice_no" 
            [(ngModel)]="grnModel.invoice_no" #invoice_no="ngModel" [ngClass]="{'is-invalid': isInvoiceInvalid}">
        </div>
      </div>
      <!-- Invoice Date -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="invoice_date" class="form-label">Invoice Date
          </label>
        </div>
        <div class="input-wrapper">
          <div class="datepicker-wrapper">
            <input type="text" class="form-control" bsDatepicker #dpi="bsDatepicker" placeholder="dd/MM/yyyy" [disabled]="itemDisable"
              [bsConfig]="{
                dateInputFormat: 'DD/MM/YYYY',
                showWeekNumbers: false
              }"
              (bsValueChange)="onDateSelected($event)" [ngModel]="grnModel.invoiceDate" (ngModelChange)="formatToDateInput($event)" [ngModelOptions]="{ standalone: true }"
              />
            <button type="button" class="btn btn-outline-secondary" (click)="dpi.show()" [disabled]="itemDisable">
              📅
            </button>
            </div> 
        </div>
      </div>
    </div>
    <div class="row">
      <!-- Doc No -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="document_number" class="form-label  mb-0">GRN No
          </label>
        </div>
        <div class="input-wrapper">
            <input type="text" class="label-input" id="document_number" [disabled]="true"  
              name="document_number" [(ngModel)]="grnModel.document_number" #document_number="ngModel">
        </div>
      </div>
      <!--Ref Doc No -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="ref_grn_id" class="form-label  mb-0">Ref Doc No
          </label>
        </div>
        <div class="input-wrapper">
          <ng-select  [items]="refNoList" bindLabel="ref_no" bindValue="ref_grn_id" [(ngModel)]="grnModel.ref_grn_id" 
            [disabled]="itemDisable" dropdownPanelClass="'black-dropdown'" [ngModelOptions]="{ standalone: true }">
          </ng-select>
        </div>
      </div>
      <!--PO Doc No -->
      <div class="col-md-2">
        <div class="label-wrapper d-flex align-items-center">
          <label for="po_no" class="form-label  mb-0">Po No
          </label>
        </div>
        <div class="input-wrapper">
          <ng-select  [items]="PoNoList" bindLabel="po_no" bindValue="po_no" [(ngModel)]="grnModel.po_no" 
            (change)="PoNoChange(grnModel.po_no)"[disabled]="itemDisable" dropdownPanelClass="'black-dropdown'" [ngModelOptions]="{ standalone: true }">
          </ng-select>
        </div>
      </div>
      <!-- Entry Date -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="voucher_date" class="form-label">Entry Date
          </label>
        </div>
        <div class="input-wrapper">
          <div class="datepicker-wrapper">
            <input type="text" class="form-control" bsDatepicker #dp="bsDatepicker" placeholder="dd/MM/yyyy" [disabled]="itemDisable"
              [bsConfig]="{
                dateInputFormat: 'DD/MM/YYYY',
                showWeekNumbers: false
              }"
              (bsValueChange)="onDateSelected($event)" [ngModel]="grnModel.voucherDate" (ngModelChange)="formatToDateInput($event)" [ngModelOptions]="{ standalone: true }"
              />
            <button type="button" class="btn btn-outline-secondary" (click)="dp.show()" [disabled]="itemDisable">
              📅
            </button>
            </div> 
        </div>
      </div>
      <!-- Reference -->
      <div class="col-md-3">
        <div class="label-wrapper">
          <label for="voucher_reference" class="form-label">Reference
          </label>
        </div>
        <div class="input-wrapper">
            <textarea class="label-input" id="voucher_reference" name="voucher_reference" rows="2"
              [(ngModel)]="grnModel.voucher_reference" #voucher_reference="ngModel" [disabled]="itemDisable" >
            </textarea>
        </div>
      </div>
    </div>
    
    <ngx-datatable 
      class="table table-bordered styled-grid"
      [rows]="rows"
      [scrollbarV]="scroll"
      [virtualization]="true"
      [style.height.px]="gridHeight"
      [columnMode]="'force'"
      [headerHeight]="80"
      [footerHeight]="60"
      [rowHeight]="30"
      [limit]="controls.pageSize"
      [externalPaging]="false"
      [selected]="selected"
      [messages]="{ emptyMessage: 'No data to display' }"
      [reorderable]="reorderable"
      [selectionType]="SelectionType.single"
      [rowIdentity]="getRowIdentity"
      (activate)="onSubListActivate($event)">

      <!-- Sl No -->
      <ngx-datatable-column name="Sl No"  prop="seq_no" [maxWidth]="70">
        <ng-template let-row="row" let-rowIndex="rowIndex" ngx-datatable-cell-template>
          <input 
          type="text" 
            class="form-control" 
            [(ngModel)]="row.seq_no"
            [ngModelOptions]="{ standalone: true }"
            value ="{{ rowIndex + 1 }}"
            />
        </ng-template>
      </ngx-datatable-column>

      <!-- Item Code -->
      <ngx-datatable-column name="Item Code" prop="item_no">
        <ng-template ngx-datatable-header-template>
          <div class="d-flex flex-column">
            <span class="datatable-heading">Item Code</span>
            <input class="form-control search mb-1" [(ngModel)]="filterStockDetails.item_no"  name="item_no"
              placeholder="Item Code" (keyup)="updateFilter($event.target.value, 'item_no')" />
          </div>
        </ng-template>
        <ng-template let-row="row" ngx-datatable-cell-template>
          <ng-select 
            [items]="ItemList" 
            bindLabel="item_code" 
            bindValue="item_no" 
            [(ngModel)]="row.item_no"
            (change)="ItemCodeEnter(row.item_no, row)"
            [disabled]="isEditable"
            class="form-control grid-select"
            [ngModelOptions]="{ standalone: true }"
            [appendTo]="'body'">
          </ng-select>
        </ng-template>
      </ngx-datatable-column>

      <!-- Model Name -->
      <ngx-datatable-column name="Model Name" prop="item_details" [minWidth]="300">
        <ng-template ngx-datatable-header-template>
          <div class="d-flex flex-column">
            <span class="datatable-heading">Model Name</span>
            <input class="form-control search mb-1" [(ngModel)]="filterStockDetails.item_name_abbr" name="item_name_abbr"
              placeholder="Model Name" (keyup)="updateFilter($event.target.value, 'item_name_abbr')" />
          </div>
        </ng-template>

        <!-- <ng-template let-row="row" ngx-datatable-cell-template>
          <ng-select 
            [items]="ItemList" 
            bindLabel="{item_code - item_name_abbr}" 
            bindValue="item_details" 
            [(ngModel)]="row.item_name_abbr"
            (change)="ModelNameChange(row)"
            [disabled]="isEditable"
            class="form-control grid-select"
            [ngModelOptions]="{ standalone: true }"
            [appendTo]="'body'">
          </ng-select>
        </ng-template> -->
         <ng-template let-row="row" ngx-datatable-cell-template>
            <input 
              list="ItemList" 
              type="text" 
              class="form-control" 
              [(ngModel)]="row.item_details" 
              [ngModelOptions]="{standalone: true}" 
              (change)="ModelNameChange(row)" 
              [disabled]="isEditable" />

            <datalist id="ItemList">
              <option *ngFor="let item of ItemList" [value]="item.item_code + ' - ' + item.item_details">
              </option>
            </datalist>
          </ng-template>
      </ngx-datatable-column>

      <!-- Unit -->
      <ngx-datatable-column name="Unit" prop="unit_name"  [maxWidth]="70">
        <ng-template let-row="row" ngx-datatable-cell-template >
          <input 
            type="text" 
            class="form-control grid-input" 
            [value]="row.unit_name"   
            disabled />
        </ng-template>
      </ngx-datatable-column>

      <!-- Local Rate -->
      <ngx-datatable-column name="P.Rate" prop="enter_rate" >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.enter_rate"   
            [disabled]="isLocalEditable" 
            [title]="'Cost Rate: ' + row.cost_rate"
            (input)="RateChange(row.enter_rate,row)"
            [ngModelOptions]="{ standalone: true }"/>
        </ng-template>
      </ngx-datatable-column>

      <!-- foreign Rate -->
      <ngx-datatable-column name="F.Rate" prop="fgn_rate" *ngIf="ForeignPO">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.fgn_rate"   
            [disabled]="isEditable" (input)="RateChange(row.fgn_rate,row)"
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column>

      <!-- Qty -->
      <ngx-datatable-column name="Qty" prop="receipt_quantity">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.receipt_quantity" 
            [disabled]="isEditable" (input)="QtyChange(row.receipt_quantity,row)"
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column>

      <!-- Retail Rate -->
      <!-- <ngx-datatable-column name="Retail Rate" prop="retail_rate" >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.retail_rate" 
            disabled 
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column> -->

      <!-- Amount (Local) -->
      <ngx-datatable-column name="Amount" prop="pamount">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.pamount" 
            [disabled]="isLocalEditable" (input)="TotalChange(row.pamount,row)"    
            [ngModelOptions]="{ standalone: true }"  />
        </ng-template>
      </ngx-datatable-column>

      <!-- F.Total (Foreign) -->
      <ngx-datatable-column name="F.Total" prop="fgn_total" *ngIf="ForeignPO">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.fgn_total" 
            [disabled]="isEditable" (input)="TotalChange(row.fgn_total,row)"  
            [ngModelOptions]="{ standalone: true }"/>
        </ng-template>
      </ngx-datatable-column>

      <!-- Retail Rate -->
      <ngx-datatable-column name="Exch. Rate" prop="exch_rate" *ngIf="ForeignPO">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.exch_rate" 
            disabled 
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column> 

      <!-- Line No -->
      <ngx-datatable-column name="Line No" prop="line_no" *ngIf="ForeignPO">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <input 
            type="number" 
            class="form-control grid-input" 
            [(ngModel)]="row.line_no"   
            [disabled]="isEditable"
            [ngModelOptions]="{ standalone: true }" />
        </ng-template>
      </ngx-datatable-column>

      <!-- Delete -->
      <ngx-datatable-column name="Delete" [maxWidth]="70">
        <ng-template let-rowIndex="rowIndex" ngx-datatable-cell-template>
          <button 
            type="button" 
            class="btn btn-danger btn-sm delete-btn" 
            (click)="deleteRow(rowIndex)" 
            [disabled]="isEditable">
            🗑️
          </button>
        </ng-template>
      </ngx-datatable-column>

      <!-- Footer -->
      <ngx-datatable-footer>
        <ng-template ngx-datatable-footer-template>
          <div class="col-md-12 d-flex justify-content-end align-items-center gap-2 datatable-footer-border">
            <span>Total Rows: {{ rows.length }}</span>
            <div class="btn-group">
              <button type="button" class="btn btn-add" (click)="addRow()" [disabled]="isEditable">➕ Add</button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-footer>
    </ngx-datatable>

    <div class="row">
      <!-- Total Qty -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="totalQty" class="form-label">Total Qty
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="totalQty" [disabled]="true"  
              name="totalQty" [(ngModel)]="totalQty" #totalQtys="ngModel">
        </div>
      </div>
      
      <!-- Status -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="approval_status" class="form-label">Status
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="approval_status" [disabled]="statusDisable"  
              name="approval_status" [(ngModel)]="grnModel.approval_status" #approval_status="ngModel">
        </div>
      </div>
    </div>

    <fieldset class="border">
      <legend class="legend-left">
        {{ 'Local Purchase Details' }}
      </legend>
      <div class="row">
        <!-- Gross Total-->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="line_amount" class="form-label">Gross Total
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="line_amount" [disabled]="true"  
                name="line_amount" [(ngModel)]="grnModel.line_amount" #line_amount="ngModel">
          </div>
        </div>  
        <!-- Discount -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="discount" class="form-label">Discount
            </label>
          </div>
          <div class="input-wrapper">
            <input type="text" class="label-input" id="discount" [disabled]="isLocalEditable"  
                name="number" [(ngModel)]="grnModel.discount" #discount="ngModel" (input)="DiscountChange(grnModel.discount)">
          </div>
        </div>
        <!-- Net Total -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="enter_amount" class="form-label">Net Total
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="enter_amount" [disabled]="true"  
                name="enter_amount" [(ngModel)]="grnModel.enter_amount" #enter_amount="ngModel">
          </div>
        </div>
      </div>
    </fieldset>

    <fieldset class="border p-3 inner-fieldset" [hidden]="!ForeignPO">
      <legend class="legend-left">
        {{ 'Forign Purchase Details' }}
      </legend>
      <div class="row">
        <!-- F.Currency -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="cur_name" class="form-label">F.Currency 
            </label>
          </div>
          <div class="input-wrapper">
            <input type="text" class="label-input" id="cur_name" [disabled]="true"  
              name="cur_name" [(ngModel)]="grnModel.cur_name" #cur_name="ngModel">
          </div>
        </div>
        <!-- Exch Rate -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="exch_rate" class="form-label">Exch.Rate
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="exch_rate" [disabled]="true"  
              name="exch_rate" [(ngModel)]="grnModel.exch_rate" #exch_rate="ngModel">
          </div>
        </div>
        <!--Consumable Exch Rate-->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="cons_exch_rate" class="form-label">Consumable Exch Rate
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="cons_exch_rate" [disabled]="true"  
              name="cons_exch_rate" [(ngModel)]="grnModel.cons_exch_rate" #cons_exch_rate="ngModel">
          </div>
        </div>
        <!-- Total In F. Currency-->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="foreign_line_amount" class="form-label">F.Total
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="foreign_line_amount" [disabled]="true"  
              name="foreign_line_amount" [(ngModel)]="grnModel.foreign_line_amount" #foreign_line_amount="ngModel">
          </div>
        </div>
        <!-- Discount in F. Currency -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="foreign_discount_amount" class="form-label">F.Discount
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="foreign_discount_amount" [disabled]="itemDisable"   (input)="forignDiscountChange(grnModel.foreign_discount_amount)"
              name="foreign_discount_amount" [(ngModel)]="grnModel.foreign_discount_amount" #foreign_discount_amount="ngModel">
          </div>
        </div>
        <!-- Net Total in F. Currency -->
        <div class="col-md-2">
          <div class="label-wrapper">
            <label for="foreign_enter_amount" class="form-label">F.Net Total
            </label>
          </div>
          <div class="input-wrapper">
            <input type="number" class="label-input" id="foreign_enter_amount" [disabled]="true"  
              name="foreign_enter_amount" [(ngModel)]="grnModel.foreign_enter_amount" #foreign_enter_amount="ngModel">
          </div>
        </div>
      </div>
    </fieldset>
    <br>
    <div class="row">
      <!-- Created By-->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="created_by" class="form-label">Created By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="created_by" [disabled]="true"  
              name="created_by" [(ngModel)]="grnModel.created_by" #created_by="ngModel">
        </div>
      </div>
      <!-- Created On-->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="created_date" class="form-label">Created On
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="created_date" [disabled]="true"  
              name="created_date" [(ngModel)]="grnModel.created_date" #created_date="ngModel">
        </div>
      </div>
      <!-- Updated By -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="modified_by" class="form-label">Modified By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="modified_by" [disabled]="true"  
              name="modified_by" [(ngModel)]="grnModel.modified_by" #modified_by="ngModel">
        </div>
      </div>
      <!-- Updated On -->
      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="modified_date" class="form-label">Modified On
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="modified_date" [disabled]="true"  
              name="modified_date" [(ngModel)]="grnModel.modified_date" #modified_date="ngModel">
        </div>
      </div>

      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="approved_by" class="form-label">Approved By
          </label>
        </div>
        <div class="input-wrapper">
          <input type="text" class="label-input" id="approved_by" [disabled]="true"  
              name="approved_by" [(ngModel)]="grnModel.approved_by" #approved_by="ngModel">
        </div>
      </div>

      <div class="col-md-2">
        <div class="label-wrapper">
          <label for="approver_remarks" class="form-label">Approval Remarks
          </label>
        </div>
        <div class="input-wrapper">
            <textarea class="label-input" id="approver_remarks" name="approver_remarks" rows="2"
              [(ngModel)]="grnModel.approver_remarks" #approver_remarks="ngModel" disabled >
            </textarea>
        </div>
      </div>
    </div>
  
    <!-- Footer Buttons -->
    <div class="inbox-compose-footer" style="overflow: hidden;">
      <div class="btn-group pull-right">
        <div class="badge bg-color-greenLight action mine"></div>
        <button type="submit" class="btn btn-primary" style="margin-right: 5px" [disabled]="saveDisable">
          <i class="fa fa-save"></i>Save
        </button>
        <button type="button" class="btn btn-danger" [disabled]="cancelDisable" (click)="cancelClickMethod()">
          <i class="fa fa-ban"></i>Cancel
        </button>
      </div>
    </div> 
  </form>
</div>
